<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/a4824506ea.js" crossorigin="anonymous"></script>

    <link rel="icon" href="/static/image/favicon.ico">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/main.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-body-secondary" data-bs-theme="light">
    <!-- HEADER-->
    <header class="header bg-body">
        <a href="/" class="navbar-brand">Wordglimpse</a>

        <div class="btn-group">
            <!-- Serch Box -->
            <div id="searchBox" class="sm-hidden bg-body-tertiary">
                <form action="/search" method="get" class="d-flex bg-body">
                    <button type="button" class="btn md-hidden"><i class="fa-solid fa-arrow-left-long" onclick="toggleSearch()"></i></button>
                    <input class="form-control" type="search" name="q" placeholder="Search.." autocomplete="off" autofocus>
                    <button type="submit" class="btn"><i class="fa-solid fa-search"></i></button>
                </form>
            </div>
            <button type="button" class="btn md-hidden" onclick="toggleSearch()"><i class="fa-solid fa-search"></i></button>

            <div>
                <button type="button" class="btn" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-end p-3">
                    <div class="form-check form-switch form-check-reverse">
                        <input class="form-check-input" type="checkbox" role="switch" id="themeToggler">
                        <label class="form-check-label" for="themeToggler">Dark Mode</label>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- MAIN TABS-->
    <main class="tab-content" id="nav-tabContent">
        <!-- ============ Feed Section starts here ============= -->
        <div class="tab-pane fade show active" id="nav-feed" role="tabpanel" aria-labelledby="nav-feed-tab" tabindex="0">
            <h1>Feed Section</h1>
        </div>
         <!-- ============ Browse Section starts here ============= -->
        <div class="tab-pane fade" id="nav-browse" role="tabpanel" aria-labelledby="nav-browse-tab" tabindex="0">
            <h1>Browse Section</h1>
        </div>
         <!-- ============ Saved Section starts here ============= -->
        <div class="tab-pane fade" id="nav-saved" role="tabpanel" aria-labelledby="nav-saved-tab" tabindex="0">
            <h1>Saved Section</h1>
        </div>
         <!-- ============ Account Section starts here ============= -->
        <div class="tab-pane fade" id="nav-account" role="tabpanel" aria-labelledby="nav-account-tab" tabindex="0">
            <h1>Account Section</h1>
        </div>
    </main>


    <!-- ===== Create new post ===== -->
    <div class="offcanvas offcanvas-bottom height-500" tabindex="-1" id="offcanvasBottom" aria-labelledby="offcanvasBottomLabel">
        <form action="/upload" method="post">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasBottomLabel">Create Post</h5>
                <button type="submit" class="btn bg-primary btn-post">Post</button>
            </div>
            <div class="offcanvas-body small">
                <div class="mb-3">
                    <label for="formFile" class="form-label">Upload An Image</label>
                    <input class="form-control" type="file" id="formFile">
                </div>

                <div class="mb-3">
                    <input class="form-control" type="text" placeholder="Title" name="title">
                </div>

                <div class="mb-3">
                    <input class="form-control" type="text" placeholder="Add Tags with space" name="tags">
                </div>

                <div class="mb-3">
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="Write here..."></textarea>
                </div>
            </div>
        </form>

    </div>

    <!--TAB Buttons-->
    <nav class="bottom-nav bg-body" role="tablist">

        <button class="btn active" id="nav-feed-tab" data-bs-toggle="tab" data-bs-target="#nav-feed" type="button" role="tab" aria-controls="nav-feed" aria-selected="true"><i class="fa-solid fa-newspaper"></i><span>Feed</span></button>

        <button class="btn" id="nav-browse-tab" data-bs-toggle="tab" data-bs-target="#nav-browse" type="button" role="tab" aria-controls="nav-browse" aria-selected="false"><i class="fa-solid fa-layer-group"></i><span>Browse</span></button>

        <button class="btn btn-write" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasBottom" aria-controls="offcanvasBottom"><i class=" fa-solid fa-pen-nib"></i></button>

        <button class="btn" id="nav-saved-tab" data-bs-toggle="tab" data-bs-target="#nav-saved" type="button" role="tab" aria-controls="nav-saved" aria-selected="false"><i class="fa-solid fa-bookmark"></i><span> Saved</span></button>

        <button class="btn" id="nav-account-tab" data-bs-toggle="tab" data-bs-target="#nav-account" type="button" role="tab" aria-controls="nav-account" aria-selected="false"><i class="fa-solid fa-user"></i><span> Account</span></button>

    </nav>
      
</body>
</html>

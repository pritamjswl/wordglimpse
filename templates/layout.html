<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!--Swiper Js-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/3.4.2/js/swiper.min.js"></script>
    <script src="/static/js/swiper.js"></script>
    <!--Font Awesome Icon-->
    <script src="https://kit.fontawesome.com/a4824506ea.js" crossorigin="anonymous"></script>
    <!--Custom statics-->
    <link rel="icon" href="/static/image/favicon.ico">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/main.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-body-secondary" data-bs-theme="light">
    <!-- HEADER-->
    <header class="header bg-body">
        <a href="/" class="navbar-brand">Wordglimpse</a>
        <div class="btn-group">
            <!-- Serch Box -->
            <div id="searchBox" class="sm-hidden bg-body-tertiary">
                <form action="/search" method="get" class="d-flex bg-body">
                    <button type="button" class="btn md-hidden"><i class="fa-solid fa-arrow-left-long" onclick="toggleSearch()"></i></button>
                    <input id="searchInput" class="form-control" type="search" name="q" placeholder="Search.." autocomplete="off" autofocus>
                    <button type="submit" class="btn"><i class="fa-solid fa-search"></i></button>
                </form>
            </div>
            <button type="button" class="btn md-hidden" onclick="toggleSearch()"><i class="fa-solid fa-search"></i></button>
            <div>
                <button type="button" class="btn" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-end p-3">
                    <div class="form-check form-switch form-check-reverse">
                        <input class="form-check-input" type="checkbox" role="switch" id="themeToggler">
                        <label class="form-check-label" for="themeToggler">Dark Mode</label>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- MAIN -->
    <main class="bg-body-tertiary">
        <div class="tab-content" id="nav-tabContent">
            <div class="tab-pane fade show active" id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab" tabindex="0">Home</div>
            <div class="tab-pane fade" id="nav-recent" role="tabpanel" aria-labelledby="nav-recent-tab" tabindex="0">Recent</div>
            <div class="tab-pane fade" id="nav-saved" role="tabpanel" aria-labelledby="nav-saved-tab" tabindex="0">Saved</div>
          </div>
    </main>

    <!--SIDENAV-->
    <aside class="p-2 bg-body" id="aside">
      <div class="d-flex mb-3" style="flex-direction: row-reverse;">
        <button type="button" class="btn md-hidden">
          <i class="fa-solid fa-xmark" style="font-size: 20px;"></i>
        </button>
      </div>

      <div class="p-2 mb-3 bg-body">
        <a href="/profile" class="account-link">
            <i class="fa-solid fa-circle-user"></i>
            <span>Your Profile</span>
        </a>
        <a href="/posts" class="account-link">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>Posts</span>
        </a>
        <a href="/following" class="account-link">
            <i class="fa-solid fa-users"></i>
            <span>Followings</span>
        </a>
      </div>
      <div class="p-2 mb-3 bg-body">
        <a href="/account" class="account-link">
            <i class="fa-solid fa-gear"></i>
            <span>Account</span>
        </a>
        <a href="/privacy" class="account-link">
            <i class="fa-solid fa-shield"></i>
            <span>Privacy</span>
        </a>
      </div>
      <div class="p-2 mb-3 bg-body">
        <a href="/help" class="account-link">
            <i class="fa-solid fa-book"></i>
            <span>Help & Support</span>
        </a>
        <a href="/about" class="account-link">
            <i class="fa-solid fa-info-circle"></i>
            <span>About</span>
        </a>
      </div>
      <div class="p-2 bg-body">
        <a href="/logout" class="account-link">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Log Out</span>
        </a>
      </div>
    </aside>

    <!-- NAV TABS -->
    <nav class="bottom-nav bg-body" id="nav-tab" role="tablist">
          <button class="btn active" id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-home" type="button" role="tab" aria-controls="nav-home" aria-selected="true">
            <i class="fa-solid fa-home"></i><span>Home</span>
          </button>
          <button class="btn" id="nav-recent-tab" data-bs-toggle="tab" data-bs-target="#nav-recent" type="button" role="tab" aria-controls="nav-recent" aria-selected="false">
            <i class="fa-solid fa-clock"></i><span>Recent</span>
          </button>
          <button class="btn btn-write" type="button">
            <i class=" fa-solid fa-pen-nib"></i><span class="sm-hidden">Create Post</span>
          </button>
          <button class="btn" id="nav-saved-tab" data-bs-toggle="tab" data-bs-target="#nav-saved" type="button" role="tab" aria-controls="nav-saved" aria-selected="false">
            <i class="fa-solid fa-bookmark"></i><span>Saved</span>
          </button>
          <button class="btn btn-account" type="button">
            <img src="/static/image/user.png"><span>Account</span>
          </button>
    </nav>
      
</body>
</html>

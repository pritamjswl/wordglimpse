<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!--Swiper Js-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/3.4.2/js/swiper.min.js"></script>
    <script src="/static/js/swiper.js"></script>
    <!--Font Awesome Icon-->
    <script src="https://kit.fontawesome.com/a4824506ea.js" crossorigin="anonymous"></script>
    <!--Custom statics-->
    <link rel="icon" href="/static/image/favicon.ico">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/main.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-body-secondary" data-bs-theme="light">
    <!-- HEADER-->
    <header class="header bg-body">
        <a href="/" class="navbar-brand">Wordglimpse</a>
        <div class="btn-group">
            <!-- Serch Box -->
            <div id="searchBox" class="sm-hidden bg-body-tertiary">
                <form action="/search" method="get" class="d-flex bg-body">
                    <button type="button" class="btn md-hidden"><i class="fa-solid fa-arrow-left-long" onclick="toggleSearch()"></i></button>
                    <input id="searchInput" class="form-control" type="search" name="q" placeholder="Search.." autocomplete="off" autofocus>
                    <button type="submit" class="btn"><i class="fa-solid fa-search"></i></button>
                </form>
            </div>
            <button type="button" class="btn md-hidden" onclick="toggleSearch()"><i class="fa-solid fa-search"></i></button>
            <div>
                <button type="button" class="btn" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-end p-3">
                    <div class="form-check form-switch form-check-reverse">
                        <input class="form-check-input" type="checkbox" role="switch" id="themeToggler">
                        <label class="form-check-label" for="themeToggler">Dark Mode</label>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- NAV TABS -->
    <!--TAB Buttons-->
    <nav class="bottom-nav bg-body">
        <a href="/" class="btn active" type="button"><i class="fa-solid fa-home"></i><span>Home</span></a>
        <a href="/recent" class="btn" type="button"><i class="fa-solid fa-clock"></i><span>Recent</span></a>
        <button class="btn btn-write" type="button"><i class=" fa-solid fa-pen-nib"></i><span class="sm-hidden">Write</span></button>
        <a href="/saved" class="btn" type="button"><i class="fa-solid fa-bookmark"></i><span>Saved</span></a>
        <a href="/account" class="btn" type="button"><i class="fa-solid fa-circle-user"></i><span>Account</span></a>
    </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/a4824506ea.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="icon" href="/static/image/favicon.ico">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/main.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-body-secondary">
    <!-- HEADER-->
    <header class="container-fluid bg-body navbar px-2">
        <a href="/" class="navbar-brand">Read Glance</a>

        <div class="btn-group">
            <!--Serch box-->
            <form id="searchForm" class="sm-hidden" action="/search" method="post">
                <input class="form-control" type="search" name="q" placeholder="Search.." autofocus>
                <button class="btn" type="submit"><i class="fa-solid fa-search"></i></button>
            </form>
            <button class="btn md-hidden" type="button" id="searchBtn"><i class="fa-solid fa-search"></i></button>
            <div class="dropdown">
                <button class="btn" type="button" data-bs-toggle="dropdown" aria-expanded="false"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                <div class="dropdown-menu dropdown-menu-end p-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckChecked" checked>
                        <label class="form-check-label" for="flexSwitchCheckChecked">Dark Mode</label>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>
</html>

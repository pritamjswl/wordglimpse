<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Share your stories, news, updates and editorial to the world in short summary with wordglimpse.">
        <meta name="keywords" content="Wordglimpse, News, Stories">
        <!--OGP-->
        <meta property="og:site_name" content="Wordglimpse">
        <meta property="og:title" content="Wordglimpse">
        <meta property="og:description" content="Share your stories, news, updates and editorial to the world in short summary with wordglimpse.">
        <meta property="og:url" content="https://word-glimpse.onrender.com/">
        <meta property="og:type" content="website">
        <meta property="og:image" content="/static/image/logo.png">
        <!--Bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <!--Font Awesome Icon-->
        <script src="https://kit.fontawesome.com/a4824506ea.js" crossorigin="anonymous"></script>
        <!--Swiper Js-->
        {% if not auth %}<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>{% endif %}
         <!--Custom statics-->
        <link rel="stylesheet" href="/static/css/styles.css">
        {% if not auth %}<script src="/static/js/main.js"></script>{% else %}<script src="/static/js/auth.js"></script>{% endif %}
        <link rel="icon" href="/static/image/logo.png">
        <title>{% block title %}{% endblock %}</title>
    </head>
<body class="{% if not auth %}bg-body-tertiary body-md-right{% endif %}" data-bs-theme="light">
    {% block body %}{% endblock %}
</body>
</html>

{% extends "base.html" %}

{% block title %}
    Signup
{% endblock %}

{% block body %}

    <div class="p-5">
        <div class="mt-5 mb-3">
            <img src="/static/image/logo.png" class="d-block m-auto" style="height:50px;">
        </div>
        <div class="mb-3">
            <h3 class="text-center"><span class="text-primary">Word</span><span class="text-danger">glimpse</span></h3>
        </div>
        <form action="/signup" method="post" class="d-block m-auto" style="width: 100%; max-width: 500px;">
            <div class="mb-3 text-center">
                <h4>Complete Registration</h4>
            </div>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingName" placeholder="Name">
                <label for="floatingName">Name</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput">Email address</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword">Password</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingConfirm" placeholder="Confirm Password">
                <label for="floatingConfirm">Confirm Password</label>
            </div>
            <div class="mb-3">
                <button class="btn btn-primary d-block m-auto" type="submit" style="width:100%; max-width:200px;">Signup</button>
            </div>
            <p class="text-center">Already have an account? <a href="/login" class="text-primary">Login</a></p>
        </form>
    </div>

{% endblock %}
